<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>College Certificate Generator</title>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">

<style>
:root{
    --primary:#1e3a8a;
    --accent:#0ea5e9;
    --bg:#f3f4f6;
}

*{margin:0;padding:0;box-sizing:border-box;font-family:'Poppins',sans-serif;}

body{
    background:var(--bg);
    padding:40px 5%;
}

.container{
    max-width:1200px;
    margin:auto;
    display:grid;
    grid-template-columns:1fr 1.3fr;
    gap:30px;
}

.form-box, .preview-box{
    background:white;
    padding:30px;
    border-radius:15px;
    box-shadow:0 10px 30px rgba(0,0,0,0.08);
}

h2{
    margin-bottom:20px;
    color:var(--primary);
}

.form-group{
    margin-bottom:15px;
}

label{
    font-size:13px;
    font-weight:600;
    display:block;
    margin-bottom:5px;
}

input{
    width:100%;
    padding:12px;
    border:1.5px solid #ddd;
    border-radius:8px;
}

input:focus{
    border-color:var(--accent);
    outline:none;
}

button{
    width:100%;
    padding:14px;
    border:none;
    border-radius:10px;
    background:var(--primary);
    color:white;
    font-weight:600;
    margin-top:10px;
    cursor:pointer;
}

button:hover{
    opacity:0.9;
}

/* CERTIFICATE DESIGN */

.certificate{
    border:12px solid var(--primary);
    padding:50px 40px;
    text-align:center;
    position:relative;
    background:#fff;
}

.logo{
    width:80px;
    margin-bottom:10px;
}

.college-name{
    font-size:22px;
    font-weight:700;
    color:var(--primary);
}

.cert-title{
    font-size:26px;
    font-weight:700;
    margin:20px 0;
}

.student-name{
    font-size:28px;
    font-weight:700;
    color:var(--accent);
    margin:15px 0;
}

.course-name{
    font-size:18px;
    font-weight:600;
    margin:10px 0;
}

.footer{
    display:flex;
    justify-content:space-between;
    margin-top:50px;
    font-size:14px;
}

.signature{
    border-top:1px solid #000;
    width:150px;
    margin:auto;
    padding-top:5px;
}

@media(max-width:900px){
    .container{
        grid-template-columns:1fr;
    }
}
</style>
</head>
<body>

<div class="container">

<div class="form-box">
<h2>🎓 Certificate Form</h2>

<div class="form-group">
<label>Student Name</label>
<input type="text" id="name" onkeyup="updateCert()">
</div>

<div class="form-group">
<label>Father's Name</label>
<input type="text" id="father" onkeyup="updateCert()">
</div>

<div class="form-group">
<label>Course Name</label>
<input type="text" id="course" onkeyup="updateCert()">
</div>

<div class="form-group">
<label>Completion Date</label>
<input type="date" id="date" onchange="updateCert()">
</div>

<div class="form-group">
<label>Certificate ID</label>
<input type="text" id="certid" onkeyup="updateCert()">
</div>

<button onclick="window.print()">Download / Print Certificate</button>

</div>


<div class="preview-box">
<div class="certificate" id="certificateArea">

<img src="logo.jpg" class="logo">

<div class="college-name">HIIT Haryana Institute Information Technology</div>

<div class="cert-title">Certificate of Completion</div>

<p>This is to certify that</p>

<div class="student-name" id="pname">Student Name</div>

<p>S/o</p>
<div id="pfather">Father Name</div>

<p>has successfully completed the course</p>

<div class="course-name" id="pcourse">Course Name</div>

<p>on</p>
<div id="pdate">Date</div>

<div class="footer">
<div>
Certificate ID:<br>
<b id="pid">0000</b>
</div>

<div>
<div class="signature">Authorized Signature</div>
</div>
</div>

</div>
</div>

</div>

<script>
function updateCert(){
    document.getElementById("pname").innerText =
        document.getElementById("name").value || "Student Name";

    document.getElementById("pfather").innerText =
        document.getElementById("father").value || "Father Name";

    document.getElementById("pcourse").innerText =
        document.getElementById("course").value || "Course Name";

    document.getElementById("pdate").innerText =
        document.getElementById("date").value || "Date";

    document.getElementById("pid").innerText =
        document.getElementById("certid").value || "0000";
}
</script>

</body>
</html>
